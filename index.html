<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EDM 英语阅读评价系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
<style>
:root {
--color-primary: #1677ff;
--color-secondary: #36cfc9;
--color-bg: #f8fafc;
}
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="min-h-screen flex flex-col">

<header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white">
        <i class="fa fa-graduation-cap"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold">EduTextMiner</h1>
        <p class="text-xs opacity-50 uppercase">Reading Analysis</p>
      </div>
    </div>
    <nav class="hidden md:flex gap-3 text-sm font-medium">
      <a class="px-3 py-2 bg-blue-500 text-white rounded-lg">首页</a>
      <a class="px-3 py-2 hover:bg-slate-100 rounded-lg">上传</a>
      <a class="px-3 py-2 hover:bg-slate-100 rounded-lg">分析</a>
      <a class="px-3 py-2 hover:bg-slate-100 rounded-lg">报告</a>
    </nav>
  </div>
</header>

<main class="flex-1 max-w-7xl mx-auto w-full px-6 py-10">

<section class="text-center max-w-3xl mx-auto mb-12">
  <h1 class="text-4xl font-bold mb-4">
    基于 <span class="text-blue-600">EDM</span> 英语阅读评价系统
  </h1>
  <p class="text-lg text-slate-600 mb-6">自动分析词汇、情感、思维层次与美育评价</p>
</section>

<div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-10">
  <h3 class="text-lg font-bold mb-4">文本上传</h3>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
    <div>
      <label class="block text-sm font-medium mb-1">姓名</label>
      <input id="name" type="text" class="w-full border border-slate-200 px-4 py-2 rounded-lg" placeholder="输入姓名">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">班级</label>
      <input id="cls" type="text" class="w-full border border-slate-200 px-4 py-2 rounded-lg" placeholder="班级">
    </div>
    <div class="md:col-span-2">
      <label class="block text-sm font-medium mb-1">书目</label>
      <select id="book" class="w-full border border-slate-200 px-4 py-2 rounded-lg">
        <option>The Great Gatsby</option>
        <option>The Little Prince</option>
        <option>To Kill a Mockingbird</option>
        <option>1984</option>
        <option>Jack and the Beanstalk</option>
      </select>
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">读后感</label>
    <textarea id="text" class="w-full border border-slate-200 px-4 py-3 rounded-lg h-40" placeholder="粘贴英文读后感"></textarea>
  </div>
  <div class="text-right mt-4">
    <button onclick="analyze()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">提交分析</button>
  </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
  <div class="bg-white p-6 rounded-xl border border-slate-200">
    <h3 class="text-lg font-bold mb-4">文本指标</h3>
    <div class="grid grid-cols-2 gap-4">
      <div class="p-4 bg-slate-50 rounded-xl text-center">
        <div id="wordCount" class="text-2xl font-bold text-blue-600">0</div>
        <div class="text-xs opacity-50">词数</div>
      </div>
      <div class="p-4 bg-slate-50 rounded-xl text-center">
        <div id="rich" class="text-2xl font-bold text-blue-600">0%</div>
        <div class="text-xs opacity-50">词汇丰富度</div>
      </div>
    </div>
    <div class="mt-4">
      <div class="mb-2">
        <div class="flex justify-between text-sm"><span>情感倾向</span><span id="sentiment">-</span></div>
      </div>
      <div class="mt-4">
        <div class="font-semibold mb-1">关键词</div>
        <div id="keywords" class="text-sm text-slate-700 flex flex-wrap gap-2"></div>
      </div>
    </div>
  </div>

  <div class="bg-white p-6 rounded-xl border border-slate-200">
    <h3 class="text-lg font-bold mb-4">五维美育评分</h3>
    <div class="space-y-3">
      <div>
        <div class="flex justify-between text-sm"><span>审美感知</span><span id="s1">0</span></div>
        <div class="h-2 bg-slate-100 rounded-full"><div id="b1" class="h-full bg-blue-500 w-0"></div></div>
      </div>
      <div>
        <div class="flex justify-between text-sm"><span>文化理解</span><span id="s2">0</span></div>
        <div class="h-2 bg-slate-100 rounded-full"><div id="b2" class="h-full bg-blue-500 w-0"></div></div>
      </div>
      <div>
        <div class="flex justify-between text-sm"><span>批判思维</span><span id="s3">0</span></div>
        <div class="h-2 bg-slate-100 rounded-full"><div id="b3" class="h-full bg-blue-500 w-0"></div></div>
      </div>
      <div>
        <div class="flex justify-between text-sm"><span>审美创造</span><span id="s4">0</span></div>
        <div class="h-2 bg-slate-100 rounded-full"><div id="b4" class="h-full bg-blue-500 w-0"></div></div>
      </div>
      <div>
        <div class="flex justify-between text-sm"><span>人格成长</span><span id="s5">0</span></div>
        <div class="h-2 bg-slate-100 rounded-full"><div id="b5" class="h-full bg-blue-500 w-0"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="bg-white p-6 rounded-xl border border-slate-200 mb-10">
  <h3 class="text-lg font-bold mb-4">AI 评价</h3>
  <p id="comment" class="text-slate-700 leading-relaxed">请提交文本生成评价</p>
</div>

<div class="bg-white p-6 rounded-xl border border-slate-200">
  <h3 class="text-lg font-bold mb-4">能力趋势</h3>
  <div class="h-72">
    <canvas id="chart"></canvas>
  </div>
</div>

</main>

<footer class="bg-white border-t border-slate-200 py-6 text-center text-sm text-slate-500">
© 2026 EduTextMiner · EDM Reading Analysis
</footer>
</div>

<script>
function analyze() {
  const t = document.getElementById('text').value.trim();
  if (!t) return alert('请输入读后感');
  
  const words = t.split(/\s+/).filter(w => w.length > 2);
  const unique = new Set(words.map(w => w.toLowerCase()));
  const wc = words.length;
  const richness = Math.round(unique.size / Math.max(wc,1) * 100);
  
  const positive = ['good', 'great', 'excellent', 'beautiful', 'hope', 'brave', 'kind', 'happy', 'love', 'better'];
  const negative = ['sad', 'bad', 'terrible', 'cruel', 'tragic', 'alone', 'scary', 'cold', 'empty'];
  let p = 0, n = 0;
  words.forEach(w => {
    if (positive.includes(w.toLowerCase())) p++;
    if (negative.includes(w.toLowerCase())) n++;
  });
  let sent = '中性';
  if (p > n) sent = '积极';
  if (n > p) sent = '消极';
  
  const freq = {};
  words.forEach(w => {
    const ww = w.toLowerCase();
    if (ww.length > 3) freq[ww] = (freq[ww] || 0) + 1;
  });
  const keys = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(i=>i[0]);
  
  const s1 = 70 + Math.floor(Math.random()*20);
  const s2 = 65 + Math.floor(Math.random()*20);
  const s3 = 75 + Math.floor(Math.random()*20);
  const s4 = 60 + Math.floor(Math.random()*20);
  const s5 = 72 + Math.floor(Math.random()*20);
  
  document.getElementById('wordCount').innerText = wc;
  document.getElementById('rich').innerText = richness + '%';
  document.getElementById('sentiment').innerText = sent;
  document.getElementById('keywords').innerHTML = keys.map(k => `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded-full text-xs">${k}</span>`).join('');
  
  document.getElementById('s1').innerText = s1;
  document.getElementById('s2').innerText = s2;
  document.getElementById('s3').innerText = s3;
  document.getElementById('s4').innerText = s4;
  document.getElementById('s5').innerText = s5;
  
  document.getElementById('b1').style.width = s1 + '%';
  document.getElementById('b2').style.width = s2 + '%';
  document.getElementById('b3').style.width = s3 + '%';
  document.getElementById('b4').style.width = s4 + '%';
  document.getElementById('b5').style.width = s5 + '%';
  
  const book = document.getElementById('book').value;
  document.getElementById('comment').innerText = `该生关于《${book}》的读后感词汇丰富度为${richness}%，表达清晰，情感倾向${sent}。文本展现出较好的阅读理解与审美意识，批判思维与文化理解较为突出。建议继续加强细节描写与创造性表达。`;
}

const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Sept','Oct','Nov','Dec'],
    datasets: [
      { label: '批判思维', data: [58,66,74,86], borderColor: '#1677ff', tension: 0.4, fill: false },
      { label: '综合素养', data: [62,70,77,85], borderColor: '#36cfc9', tension: 0.4, fill: false }
    ]
  },
  options: { responsive: true, maintainAspectRatio: false }
});
</script>
</body>
</html>
