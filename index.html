<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语阅读美育评价系统</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-5xl mx-auto px-4 py-10">

  <h1 class="text-3xl font-bold mb-6 text-center">英语阅读美育评价系统</h1>

  <!-- 输入区 -->
  <div class="bg-white rounded-xl p-6 shadow-sm mb-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div>
        <label class="text-sm font-medium block mb-1">姓名</label>
        <input id="name" class="w-full border rounded px-3 py-2">
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">班级</label>
        <input id="cls"  class="w-full border rounded px-3 py-2">
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">书目</label>
        <select id="book" class="w-full border rounded px-3 py-2">
          <option>The Great Gatsby</option>
          <option>The Little Prince</option>
          <option>To Kill a Mockingbird</option>
          <option>1984</option>
        </select>
      </div>
    </div>
    <div class="mb-4">
      <label class="text-sm font-medium block mb-1">读后感</label>
      <textarea id="text" rows="8" class="w-full border rounded px-3 py-2"></textarea>
    </div>
    <button onclick="analyze()" class="bg-blue-600 text-white px-6 py-2 rounded font-medium">
      一键分析
    </button>
  </div>

  <!-- 结果区 -->
  <div id="result" class="bg-white rounded-xl p-6 shadow-sm mb-8 hidden">
    <div class="mb-4 pb-4 border-b">
      <h3 class="font-bold mb-2">文本基础指标</h3>
      <p>总词数：<span id="wc"></span></p>
      <p>不重复词数：<span id="types"></span></p>
      <p>词汇丰富度(RTTR)：<span id="rttr"></span></p>
      <p>情感倾向：<span id="sent"></span></p>
      <p>关键词：<span id="kw" class="text-blue-700"></span></p>
    </div>

    <div class="mb-4 pb-4 border-b">
      <h3 class="font-bold mb-3">五维美育评分</h3>
      <div class="space-y-3 text-sm">
        <div><b>审美感知：</b><span id="s1"></span> — <span id="r1" class="text-slate-600"></span></div>
        <div><b>文化理解：</b><span id="s2"></span> — <span id="r2" class="text-slate-600"></span></div>
        <div><b>批判思维：</b><span id="s3"></span> — <span id="r3" class="text-slate-600"></span></div>
        <div><b>审美创造：</b><span id="s4"></span> — <span id="r4" class="text-slate-600"></span></div>
        <div><b>人格成长：</b><span id="s5"></span> — <span id="r5" class="text-slate-600"></span></div>
      </div>
    </div>

    <div class="mb-4 pb-4 border-b">
      <h3 class="font-bold mb-2">综合评价</h3>
      <p id="comment" class="text-slate-700 leading-relaxed"></p>
    </div>

    <button onclick="saveLocal()" class="bg-green-600 text-white px-4 py-2 rounded mr-2">保存到本地</button>
    <button onclick="exportOne()" class="bg-indigo-600 text-white px-4 py-2 rounded">导出本条记录</button>
  </div>

  <!-- 历史记录 -->
  <div class="bg-white rounded-xl p-6 shadow-sm">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold">班级历史记录</h3>
      <button onclick="exportAll()" class="bg-gray-700 text-white px-3 py-1 rounded text-sm">导出全部Excel</button>
    </div>
    <div id="history" class="text-sm space-y-2 max-h-60 overflow-auto"></div>
  </div>

</div>

<script>
let currentData = null;

function analyze() {
  const name = document.getElementById('name').value.trim();
  const cls = document.getElementById('cls').value.trim();
  const text = document.getElementById('text').value.trim();
  if (!name || !cls || !text) return alert('请完善信息');

  // 基础指标
  const words = text.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  const wc = words.length;
  const types = new Set(words).size;
  const rttr = Math.sqrt(wc) > 0 ? (types / Math.sqrt(wc)).toFixed(2) : 0;

  // 情感
  const pos = ['hope', 'brave', 'good', 'great', 'beautiful', 'admire', 'kind', 'wise'];
  const neg = ['sad', 'bad', 'cruel', 'tragic', 'cold', 'empty', 'selfish', 'broken'];
  let pc = 0, nc = 0;
  words.forEach(w => { pos.includes(w) && pc++; neg.includes(w) && nc++; });
  const sent = pc > nc ? '积极' : nc > pc ? '消极' : '中性';

  // 关键词
  const freq = {};
  words.forEach(w => freq[w] = (freq[w] || 0) + 1);
  const kw = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6).map(i=>i[0]).join('、');

  // 五维评分 + 理由
  const s1 = Math.min(95, 70 + pc + (text.match(/beautiful|wonderful|strange|strange|light|blue|dream/g)?.length||0)*2);
  const s2 = Math.min(95, 65 + (text.match(/society|american|dream|wealth|value|life/g)?.length||0)*3);
  const s3 = Math.min(95, 70 + (text.match(/think|believe|should|because|therefore|in my opinion/g)?.length||0)*3);
  const s4 = Math.min(95, 65 + (text.match(/i think|i feel|maybe|could|would|imagine/g)?.length||0)*2);
  const s5 = Math.min(95, 72 + pc*2);

  const r1 = s1 >= 85 ? '善于感知语言美与情感' : s1 >=75 ? '能感知文本情感' : '情感表达较基础';
  const r2 = s2 >= 85 ? '文化背景理解深刻' : s2 >=75 ? '理解基本文化内涵' : '文化理解有待加强';
  const r3 = s3 >= 85 ? '具备较强批判与评价思维' : s3 >=75 ? '能进行简单分析' : '以复述内容为主';
  const r4 = s4 >= 85 ? '有独特个人观点与创造意识' : s4 >=75 ? '有一定个人想法' : '个人表达较少';
  const r5 = s5 >= 85 ? '阅读感悟深刻，体现正向价值' : s5 >=75 ? '有一定收获与反思' : '反思较少';

  // 评价
  const comment = `该生读后感词汇丰富度(RTTR=${rttr})，情感倾向${sent}。审美感知${s1}分，文化理解${s2}分，批判思维${s3}分，审美创造${s4}分，人格成长${s5}分。整体表现${s3+s2>=160?'良好':'一般'}，建议${s3+s2>=160?'加强创意表达':'提升分析与反思深度'}。`;

  // 显示
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('wc').textContent = wc;
  document.getElementById('types').textContent = types;
  document.getElementById('rttr').textContent = rttr;
  document.getElementById('sent').textContent = sent;
  document.getElementById('kw').textContent = kw;
  document.getElementById('s1').textContent = s1;
  document.getElementById('s2').textContent = s2;
  document.getElementById('s3').textContent = s3;
  document.getElementById('s4').textContent = s4;
  document.getElementById('s5').textContent = s5;
  document.getElementById('r1').textContent = r1;
  document.getElementById('r2').textContent = r2;
  document.getElementById('r3').textContent = r3;
  document.getElementById('r4').textContent = r4;
  document.getElementById('r5').textContent = r5;
  document.getElementById('comment').textContent = comment;

  currentData = { name, cls, book: document.getElementById('book').value, wc, rttr, sent, s1,s2,s3,s4,s5, comment, time: new Date().toLocaleString() };
}

// 保存本地
function saveLocal() {
  if (!currentData) return;
  let list = JSON.parse(localStorage.getItem('readings') || '[]');
  list.push(currentData);
  localStorage.setItem('readings', JSON.stringify(list));
  alert('保存成功');
  showHistory();
}

// 显示历史
function showHistory() {
  const list = JSON.parse(localStorage.getItem('readings') || '[]');
  const h = document.getElementById('history');
  h.innerHTML = list.map((i,idx) => `
  <div class="p-2 border rounded">${idx+1}. ${i.name}(${i.cls}) | ${i.book} | 批判思维${i.s3} | 总分${(i.s1+i.s2+i.s3+i.s4+i.s5)/5|0}</div>
  `).join('');
}

// 导出单条
function exportOne() {
  if (!currentData) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([`姓名,班级,书目,总词数,RTTR,情感,审美感知,文化理解,批判思维,审美创造,人格成长,评价
${currentData.name},${currentData.cls},${currentData.book},${currentData.wc},${currentData.rttr},${currentData.sent},${currentData.s1},${currentData.s2},${currentData.s3},${currentData.s4},${currentData.s5},"${currentData.comment}"`], { type: 'text/csv' }));
  a.download = '阅读评价.csv';
  a.click();
}

// 导出全部
function exportAll() {
  const list = JSON.parse(localStorage.getItem('readings') || '[]');
  const head = '姓名,班级,书目,总词数,RTTR,情感,审美感知,文化理解,批判思维,审美创造,人格成长,评价\n';
  const rows = list.map(i => `${i.name},${i.cls},${i.book},${i.wc},${i.rttr},${i.sent},${i.s1},${i.s2},${i.s3},${i.s4},${i.s5},"${i.comment}"`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([head+rows], { type: 'text/csv' }));
  a.download = '班级阅读评价.csv';
  a.click();
}

// 初始化
showHistory();
</script>
</body>
</html>
